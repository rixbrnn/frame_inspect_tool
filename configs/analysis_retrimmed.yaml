# Analysis configuration for 4 re-trimmed Cyberpunk videos
# These videos were re-trimmed with corrected ROI (10% instead of 15%)
# to fix false FPS detection from loading percentages

paths:
  base_dir: recordings/cyberpunk/trimmed
  results_dir: results/cyberpunk/retrimmed

settings:
  roi: "top-left 10%"           # Corrected ROI to avoid false positives
  sample_rate: 10                # Extract metrics every 10 frames (temporal sampling)
  compute_advanced: true         # Enable LPIPS, FLIP, Optical Flow
  use_gpu: true                  # Use GPU for LPIPS/VMAF
  compute_vmaf: true             # Include VMAF metric
  extract_fps: true              # Extract FPS data from overlay

comparisons:
  # 1080p_dlss_performance - re-trimmed
  - reference: 1080p_dlaa_run1.mp4
    compare: 1080p_dlss_performance.mp4
    name: 1080p_DLAA_vs_Performance_retrimmed

  # 1440p_dlss_performance - re-trimmed
  - reference: 1440p_dlaa_run1.mp4
    compare: 1440p_dlss_performance.mp4
    name: 1440p_DLAA_vs_Performance_retrimmed

  # 4k_dlaa_run1 - re-trimmed (consistency check)
  - reference: 4k_dlaa_run1.mp4
    compare: 4k_dlaa_run2.mp4
    name: 4k_DLAA_Consistency_retrimmed

  # 4k_dlss_performance - re-trimmed
  - reference: 4k_dlaa_run1.mp4
    compare: 4k_dlss_performance.mp4
    name: 4k_DLAA_vs_Performance_retrimmed
